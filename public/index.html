    <!-- Twitter Card Meta Tags -->

    <meta name="twitter:title" content="Bitdefender Antivirus - Advanced Cybersecurity Protection" />
    <meta name="twitter:description" content="Protect your digital world with Bitdefender's award-winning antivirus solutions." />
    <meta name="twitter:image" content="%PUBLIC_URL%/twitter-image.jpg" />
    
    <!-- Favicon and App Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>Bitdefender Antivirus - Advanced Cybersecurity Protection</title>
    <meta name="google-site-verification" content="WjFe0suzPvI9SIh66fOt6VgUgIXQtdetebx7mQan4ao" />
    <meta name="msvalidate.01" content="A2D8FECB3D5430367B1A619BDE56044F" />
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 40px; font-family: Arial, sans-serif;">
        <h1 style="color: #E30613;">Bitdefender Antivirus</h1>
        <p>You need to enable JavaScript to run this app.</p>
        <p>Please enable JavaScript in your browser settings and refresh the page.</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Loading Spinner (Optional - shows until React loads) -->
    <div id="initial-loader" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    ">
      <div style="text-align: center;">
        <div style="
          width: 60px;
          height: 60px;
          margin: 0 auto 20px;
          border: 4px solid rgba(255,255,255,0.3);
          border-top: 4px solid #E30613;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
        <div style="color: white; font-size: 18px; font-family: Arial, sans-serif;">
          Loading Bitdefender...
        </div>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      /* Hide loader when React is ready */
      .loader-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
    
    <script>
      // Hide loader when React is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.classList.add('loader-hidden');
            setTimeout(function() {
              loader.style.display = 'none';
            }, 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
